version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: pos_system
    depends_on:
      - db
    volumes:
      - .:/var/www/html/

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pos_system
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./pos_system_new.sql:/docker-entrypoint-initdb.d/pos_system.sql

volumes:
  db_data:
